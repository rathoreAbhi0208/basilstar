<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Basilstar · Market Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --paper:     #f7f5ef;
  --paper2:    #efece2;
  --card:      #fffdf8;
  --ink:       #17201c;
  --ink-soft:  #46524a;
  --ink-faint: #8a9189;
  --line:      #ddd8c8;
  --line2:     #cac4ad;
  --forest:    #1c4d3c;
  --forest-lt: #e8efe9;
  --gold:      #a97a2f;
  --gold-lt:   #f4ead4;
  --up:        #1a7a4c;
  --up-lt:     #e3f3e8;
  --down:      #b23b3b;
  --down-lt:   #fbe9e7;
  --mixed:     #7a5ba3;
  --mixed-lt:  #efe8f7;
  --neutral:   #7a7462;
  --neutral-lt:#efece2;
  --font:      'Inter', sans-serif;
  --serif:     'Source Serif 4', serif;
  --mono:      'IBM Plex Mono', monospace;
  --r:         3px;
  --r2:        4px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px);
  background-size: 100% 42px;
  background-attachment: local;
}

/* ── Topbar ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--paper);
  border-bottom: 2px solid var(--ink);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 64px; gap: 16px;
}

.brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

.brand-mark {
  width: 26px; height: 26px;
  background: var(--forest);
  clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
}

.brand-name {
  font-family: var(--serif); font-size: 22px; font-weight: 700;
  letter-spacing: -0.01em; color: var(--ink);
}
.brand-tag {
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.14em;
  color: var(--ink-faint); text-transform: uppercase; margin-left: 6px;
  padding-left: 10px; border-left: 1px solid var(--line2);
  display: none;
}
@media (min-width: 900px) { .brand-tag { display: inline; } }

.status-pill {
  display: flex; align-items: center; gap: 7px;
  background: var(--card); border: 1px solid var(--line2);
  border-radius: 999px; padding: 5px 14px;
  font-family: var(--mono); font-size: 10.5px; color: var(--ink-soft);
  letter-spacing: 0.05em;
}

.dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--up);
}
.dot.offline { background: var(--down); }
.dot.live { animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

.topbar-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }

.meta-chip {
  font-family: var(--mono); font-size: 10px; color: var(--ink-faint);
  letter-spacing: 0.05em;
}
.meta-chip b { color: var(--forest); font-weight: 600; }

.refresh-btn {
  background: var(--forest); border: 1px solid var(--forest);
  color: #fff; font-family: var(--mono); font-size: 10.5px;
  padding: 7px 15px; border-radius: var(--r); cursor: pointer;
  letter-spacing: 0.06em; transition: all 0.15s;
}
.refresh-btn:hover { background: #163d30; }
.refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── View tabs (News / Financial Results) ── */
.view-tabs {
  display: flex; gap: 2px;
  background: var(--paper2);
  border-bottom: 1px solid var(--line);
  padding: 0 32px;
  position: sticky; top: 64px; z-index: 90;
}
.view-tab {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--ink-faint);
  background: none; border: none; border-bottom: 2px solid transparent;
  padding: 12px 4px; margin-right: 26px; cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.view-tab:hover { color: var(--ink-soft); }
.view-tab.active { color: var(--forest); border-bottom-color: var(--forest); font-weight: 600; }
.view-tab .tab-count {
  font-size: 9.5px; color: var(--ink-faint); background: var(--card);
  border: 1px solid var(--line2); border-radius: 999px; padding: 1px 7px;
}
.view-tab.active .tab-count { color: var(--forest); border-color: rgba(28,77,60,0.25); }

/* ── Layout ── */
.layout {
  display: grid; grid-template-columns: 236px 1fr;
  min-height: calc(100vh - 64px);
}

/* ── Sidebar ── */
.sidebar {
  border-right: 1px solid var(--line);
  padding: 24px 0;
  position: sticky; top: 105px;
  height: calc(100vh - 105px);
  overflow-y: auto;
  background: var(--paper2);
}

.sidebar-section {
  padding: 0 18px 20px; margin-bottom: 20px;
  border-bottom: 1px solid var(--line);
}
.sidebar-section:last-child { border-bottom: none; margin-bottom: 0; }

.sidebar-label {
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink-faint); margin-bottom: 10px;
}

.search-box {
  width: 100%;
  background: var(--card); border: 1px solid var(--line2);
  border-radius: var(--r); padding: 8px 12px;
  color: var(--ink); font-family: var(--font); font-size: 13px;
  outline: none; transition: border-color 0.15s;
}
.search-box:focus { border-color: var(--forest); }
.search-box::placeholder { color: var(--ink-faint); }

.filter-group { display: flex; flex-direction: column; gap: 2px; }

.filter-btn {
  display: flex; align-items: center; justify-content: space-between;
  background: none; border: none; padding: 7px 9px; border-radius: var(--r);
  color: var(--ink-soft); font-family: var(--font); font-size: 13px;
  cursor: pointer; text-align: left; transition: all 0.12s;
}
.filter-btn:hover { background: var(--card); color: var(--ink); }
.filter-btn.active { background: var(--forest); color: #fff; }

/* ── Main ── */
.main { padding: 30px 32px; max-width: 1000px; }

.feed-eyebrow {
  font-family: var(--mono); font-size: 10px; color: var(--gold);
  letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 8px;
  font-weight: 600;
}

.feed-title {
  font-family: var(--serif); font-size: 32px; font-weight: 700;
  color: var(--ink); letter-spacing: -0.015em; margin-bottom: 6px;
}

.feed-sub {
  font-size: 13px; color: var(--ink-soft);
}

.controls-bar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; margin: 22px 0 22px; padding-top: 18px;
  border-top: 1px solid var(--line); flex-wrap: wrap;
}

.sort-row { display: flex; gap: 6px; }

.sort-btn {
  background: var(--card); border: 1px solid var(--line2);
  color: var(--ink-soft); font-family: var(--mono); font-size: 10px;
  padding: 6px 13px; border-radius: var(--r); cursor: pointer;
  letter-spacing: 0.06em; text-transform: uppercase; transition: all 0.12s;
}
.sort-btn:hover { border-color: var(--forest); color: var(--forest); }
.sort-btn.active { border-color: var(--forest); color: #fff; background: var(--forest); }

.feed-count-badge {
  font-family: var(--mono); font-size: 11px; color: var(--ink-faint);
}

/* ── Article Grid ── */
.articles { display: grid; grid-template-columns: 1fr; gap: 16px; }

/* ── Card ── */
.card {
  background: var(--card);
  border: 1px solid var(--line2);
  border-radius: var(--r2);
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s;
  display: grid;
  grid-template-columns: 220px 1fr;
}

.card:hover {
  border-color: var(--forest);
  box-shadow: 0 4px 18px rgba(28,77,60,0.09);
}

.card.expanded { border-color: var(--forest); }

@media (max-width: 700px) {
  .card { grid-template-columns: 1fr; }
}

/* image */
.card-img-wrap {
  width: 100%; height: 100%; min-height: 160px; overflow: hidden; position: relative;
  background: var(--paper2);
}

.card-img-wrap img {
  width: 100%; height: 100%; object-fit: cover;
  display: block;
}

.card-img-placeholder {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint); letter-spacing: 0.08em;
  background: repeating-linear-gradient(135deg, var(--paper2), var(--paper2) 10px, #e6e2d4 10px, #e6e2d4 11px);
}

/* sentiment stripe */
.card-stripe {
  position: absolute; top: 0; left: 0; bottom: 0; width: 4px;
}
.stripe-positive { background: var(--up); }
.stripe-negative { background: var(--down); }
.stripe-neutral  { background: var(--neutral); }
.stripe-mixed    { background: var(--mixed); }

.chip {
  font-family: var(--mono); font-size: 9.5px; font-weight: 600;
  letter-spacing: 0.05em; padding: 3px 8px; border-radius: 3px;
  text-transform: uppercase; white-space: nowrap;
}

.chip-category { background: var(--forest-lt); color: var(--forest); border: 1px solid rgba(28,77,60,0.18); }
.chip-positive  { background: var(--up-lt); color: var(--up); border: 1px solid rgba(26,122,76,0.2); }
.chip-negative  { background: var(--down-lt); color: var(--down); border: 1px solid rgba(178,59,59,0.2); }
.chip-neutral   { background: var(--neutral-lt); color: var(--neutral); border: 1px solid rgba(122,116,98,0.2); }
.chip-mixed     { background: var(--mixed-lt); color: var(--mixed); border: 1px solid rgba(122,91,163,0.2); }
.chip-impact-critical { background: var(--down-lt); color: var(--down); border: 1px solid rgba(178,59,59,0.25); }
.chip-impact-high     { background: var(--gold-lt); color: var(--gold); border: 1px solid rgba(169,122,47,0.25); }
.chip-impact-medium   { background: var(--forest-lt); color: var(--forest); border: 1px solid rgba(28,77,60,0.2); }
.chip-impact-low      { background: var(--neutral-lt); color: var(--neutral); border: 1px solid rgba(122,116,98,0.2); }

/* card body */
.card-body { padding: 16px 20px 16px 18px; position: relative; display: flex; flex-direction: column; }

.card-chips-row {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;
}

.card-headline {
  font-family: var(--serif); font-size: 18px; font-weight: 600; letter-spacing: -0.01em;
  line-height: 1.35; margin-bottom: 8px; color: var(--ink);
}

.card-summary { font-size: 13px; color: var(--ink-soft); line-height: 1.65; margin-bottom: 12px; flex: 1; }

.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px; margin-top: auto;
  padding-top: 10px; border-top: 1px solid var(--line);
}

.card-meta {
  font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint);
  display: flex; gap: 12px; flex-wrap: wrap;
}

.card-meta b { color: var(--forest); font-weight: 600; }

.expand-btn {
  font-family: var(--mono); font-size: 9px; color: var(--forest);
  letter-spacing: 0.06em; background: var(--forest-lt); border: 1px solid rgba(28,77,60,0.2);
  padding: 3px 10px; border-radius: 3px; text-transform: uppercase; white-space: nowrap;
}

/* expanded story */
.card-story {
  display: none; grid-column: 1 / -1;
  border-top: 2px solid var(--ink);
  padding: 22px 26px 26px;
  background: var(--paper2);
}
.card.expanded .card-story { display: block; }

.story-section { margin-bottom: 16px; }
.story-section:last-child { margin-bottom: 0; }

.story-label {
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 6px;
}

.story-text {
  font-size: 13.5px; line-height: 1.8; color: var(--ink); white-space: pre-wrap;
}

.story-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 16px;
}
@media (max-width: 600px) { .story-grid { grid-template-columns: 1fr; } }

.story-tags-wrap { margin-top: 18px; display: flex; flex-direction: column; gap: 10px; }

.tag-list { display: flex; gap: 6px; flex-wrap: wrap; }

.sector-tag {
  font-size: 11px; font-family: var(--mono); color: var(--forest);
  background: var(--forest-lt); border: 1px solid rgba(28,77,60,0.2);
  padding: 3px 9px; border-radius: 3px;
}
.entity-tag {
  font-size: 11px; font-family: var(--mono); color: var(--gold);
  background: var(--gold-lt); border: 1px solid rgba(169,122,47,0.25);
  padding: 3px 9px; border-radius: 3px;
}
.plain-tag {
  font-size: 11px; font-family: var(--mono); color: var(--ink-soft);
  background: var(--card); border: 1px solid var(--line2);
  padding: 3px 9px; border-radius: 3px;
}

.story-source-line {
  margin-top: 18px; padding-top: 14px; border-top: 1px dashed var(--line2);
  font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint);
  display: flex; flex-wrap: wrap; gap: 8px;
}
.story-source-line a { color: var(--forest); text-decoration: none; }
.story-source-line a:hover { text-decoration: underline; }

/* ══════════════════ Financial Results ══════════════════ */

.fi-card {
  background: var(--card);
  border: 1px solid var(--line2);
  border-radius: var(--r2);
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s;
  display: grid;
  grid-template-columns: 188px 1fr;
  position: relative;
}
.fi-card:hover { border-color: var(--forest); box-shadow: 0 4px 18px rgba(28,77,60,0.09); }
.fi-card.expanded { border-color: var(--forest); }
@media (max-width: 700px) { .fi-card { grid-template-columns: 1fr; } }

/* left ticker rail — reads like a certificate stub */
.fi-rail {
  position: relative;
  background: var(--paper2);
  border-right: 1px dashed var(--line2);
  padding: 18px 16px;
  display: flex; flex-direction: column;
}
.fi-rail::before {
  content: '';
  position: absolute; top: 0; left: 0; bottom: 0; width: 4px;
}
.fi-rail.rail-bullish::before { background: var(--up); }
.fi-rail.rail-bearish::before { background: var(--down); }
.fi-rail.rail-neutral::before { background: var(--neutral); }
.fi-rail.rail-mixed::before   { background: var(--mixed); }

.fi-symbol { font-family: var(--serif); font-weight: 700; font-size: 23px; letter-spacing: -0.01em; color: var(--ink); line-height: 1.1; }
.fi-exchange { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.1em; color: var(--ink-faint); margin-top: 3px; }
.fi-company { font-size: 11.5px; color: var(--ink-soft); line-height: 1.4; margin-top: 9px; }
.fi-rail-divider { border-top: 1px dashed var(--line2); margin: 12px 0 10px; }
.fi-quarter { font-family: var(--mono); font-size: 10.5px; color: var(--forest); font-weight: 600; }
.fi-result-date { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); margin-top: 3px; }

/* recommendation stamp */
.stamp {
  position: absolute; top: 14px; right: 16px;
  font-family: var(--mono); font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 5px 13px; border: 2px solid currentColor; border-radius: 2px;
  transform: rotate(-5deg);
  background: rgba(255,253,248,0.7);
}
.stamp::after {
  content: ''; position: absolute; inset: 2px; border: 1px solid currentColor; border-radius: 1px;
}
.stamp-buy  { color: var(--up); }
.stamp-sell { color: var(--down); }
.stamp-hold { color: var(--neutral); }

.fi-body { padding: 16px 20px 16px 18px; display: flex; flex-direction: column; }
.fi-chips-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; padding-right: 90px; }
.fi-headline {
  font-family: var(--serif); font-size: 18px; font-weight: 600; letter-spacing: -0.01em;
  line-height: 1.35; margin-bottom: 8px; color: var(--ink);
}
.fi-summary { font-size: 13px; color: var(--ink-soft); line-height: 1.65; margin-bottom: 12px; flex: 1; }

/* metrics ledger row */
.fi-metrics-row {
  display: flex; gap: 26px; flex-wrap: wrap;
  padding: 12px 14px; margin-bottom: 16px;
  background: var(--paper2); border: 1px solid var(--line);
  border-radius: var(--r);
}
.fi-metric { display: flex; flex-direction: column; gap: 3px; }
.fi-metric-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-faint); }
.fi-metric-value { font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--ink); }
.fi-metric-delta { font-family: var(--mono); font-size: 11px; font-weight: 600; }
.delta-up   { color: var(--up); }
.delta-down { color: var(--down); }

.fi-footer {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px; margin-top: auto;
  padding-top: 10px; border-top: 1px solid var(--line);
}
.fi-meta { font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint); display: flex; gap: 12px; flex-wrap: wrap; }

/* expanded FI story */
.fi-story { display: none; grid-column: 1 / -1; border-top: 2px solid var(--ink); padding: 22px 26px 26px; background: var(--paper2); }
.fi-card.expanded .fi-story { display: block; }

.forecast-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 6px; }
@media (max-width: 600px) { .forecast-grid { grid-template-columns: 1fr; } }
.forecast-card { background: var(--card); border: 1px solid var(--line2); border-radius: var(--r); padding: 13px 15px; }
.forecast-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.forecast-dir { font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: 0.06em; }
.dir-up   { color: var(--up); }
.dir-down { color: var(--down); }
.dir-flat { color: var(--neutral); }
.forecast-conf {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink-faint); border: 1px solid var(--line2); border-radius: 999px; padding: 2px 8px;
}
.forecast-reason { font-size: 12.5px; color: var(--ink-soft); line-height: 1.6; }

.fi-detail-strip {
  margin-top: 18px; padding-top: 14px; border-top: 1px dashed var(--line2);
  font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint);
  display: flex; flex-wrap: wrap; gap: 8px 18px;
}
.fi-detail-strip b { color: var(--forest); font-weight: 600; }

/* ── Skeleton ── */
.skeleton {
  background: linear-gradient(90deg, var(--card) 25%, var(--paper2) 50%, var(--card) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 3px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

.skel-card {
  background: var(--card); border: 1px solid var(--line2);
  border-radius: var(--r2); overflow: hidden; display: grid;
  grid-template-columns: 220px 1fr;
}
.skel-img { width: 100%; height: 100%; min-height: 160px; }
.skel-body { padding: 18px 20px; }
.skel-line { height: 12px; margin-bottom: 10px; }
.skel-h { height: 20px; width: 75%; margin-bottom: 12px; }
.skel-b1 { width: 92%; } .skel-b2 { width: 68%; }

/* ── Load More ── */
.load-more {
  display: block; width: 100%; margin-top: 4px; padding: 15px;
  background: var(--card); border: 1px dashed var(--line2);
  border-radius: var(--r2); color: var(--ink-soft); font-family: var(--mono);
  font-size: 11px; cursor: pointer; letter-spacing: 0.07em;
  transition: all 0.15s; text-transform: uppercase;
}
.load-more:hover { border-color: var(--forest); color: var(--forest); background: var(--forest-lt); }

/* ── Empty ── */
.empty {
  text-align: center; padding: 80px 20px; color: var(--ink-faint);
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em;
}
.empty .icon { font-size: 32px; display: block; margin-bottom: 16px; opacity: 0.4; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .main { padding: 18px; }
  .topbar { padding: 0 16px; }
  .meta-chip { display: none; }
  .view-tabs { padding: 0 16px; }
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 3px; }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand-mark"></div>
    <span class="brand-name">Basilstar</span>
    <span class="brand-tag">Market Intelligence Desk</span>
  </div>

  <div class="status-pill" id="statusPill">
    <div class="dot live" id="statusDot"></div>
    <span id="statusText">LOADING…</span>
  </div>

<script>
const API_BASE   = 'http://127.0.0.1:8000';
const NEWS_URL   = `${API_BASE}/news`;
const STATUS_URL = `${API_BASE}/news/status`;
const REFRESH_URL= `${API_BASE}/news/refresh`;
// Adjust this to match your backend's actual route for the FI feature.
const RESULTS_URL = `${API_BASE}/financial-results`;

const EVENT_CATEGORIES = [
  "Results","Guidance Revision","Dividend","Bonus","Stock Split","Buyback",
  "Rights Issue","IPO","QIP","Merger","Acquisition","Demerger","Joint Venture",
  "Order Win","Contract Announcement","Promoter Stake Change","Insider Trading",
  "SEBI Circular","NSE Circular","BSE Notice","RBI Policy","Repo Rate",
  "Inflation","GDP","IIP","PMI","Trade Data","Budget","Crude Oil","Commodity",
  "Currency","FII","DII","Block Deal","Bulk Deal","Credit Rating",
  "Corporate Governance","Regulatory Action","Management Change","Litigation",
  "Bankruptcy","Legal Action","Index Change","Other"
];

let currentView = 'news';

const state = {
  articles: [], total: 0, page: 1, pageSize: 20,
  sort: 'newest', sentiment: '', impact: '', category: '', search: '',
  loading: false,
};

const fiState = {
  results: [], total: 0, page: 1, pageSize: 20,
  sort: 'newest', sentiment: '', impact: '', recommendation: '', exchange: '', search: '',
  loading: false, loaded: false,
};

document.addEventListener('DOMContentLoaded', () => {
  buildCategoryFilters();
  fetchStatus();
  fetchArticles(true);

  let t;
  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(t);
    t = setTimeout(() => { state.search = e.target.value.trim(); fetchArticles(true); }, 350);
  });

  let t2;
  document.getElementById('fiSearchInput').addEventListener('input', e => {
    clearTimeout(t2);
    t2 = setTimeout(() => { fiState.search = e.target.value.trim(); fetchFiResults(true); }, 350);
  });

  setInterval(fetchStatus, 30000);
});

function switchView(view) {
  currentView = view;
  document.getElementById('tab-news').classList.toggle('active', view === 'news');
  document.getElementById('tab-results').classList.toggle('active', view === 'results');
  document.getElementById('newsView').style.display = view === 'news' ? 'block' : 'none';
  document.getElementById('resultsView').style.display = view === 'results' ? 'block' : 'none';
  document.getElementById('newsFilters').style.display = view === 'news' ? 'block' : 'none';
  document.getElementById('resultsFilters').style.display = view === 'results' ? 'block' : 'none';
  if (view === 'results' && !fiState.loaded) fetchFiResults(true);
}

function buildCategoryFilters() {
  const c = document.getElementById('categoryFilters');
  EVENT_CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.val = cat;
    btn.textContent = cat;
    btn.onclick = () => setFilter('category', cat, btn);
    c.appendChild(btn);
  });
}

async function fetchStatus() {
  try {
    const r = await fetch(STATUS_URL);
    if (!r.ok) throw new Error();
    const d = await r.json();
    const dot  = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    dot.className = 'dot live' + (d.running ? '' : ' offline');
    text.textContent = `${d.market_state} · ${d.interval_minutes}m CYCLE`;
    document.getElementById('totalCount').textContent = d.total_articles_in_db;
    const s = d.next_fetch_in_seconds;
    document.getElementById('nextFetch').textContent = s > 60 ? `${Math.floor(s/60)}m ${s%60}s` : `${s}s`;
  } catch {
    document.getElementById('statusText').textContent = 'OFFLINE';
    document.getElementById('statusDot').className = 'dot offline';
  }
}

async function fetchArticles(reset = false) {
  if (state.loading) return;
  state.loading = true;
  if (reset) { state.page = 1; state.articles = []; }
  const p = new URLSearchParams({ page: state.page, page_size: state.pageSize, sort: state.sort });
  if (state.sentiment) p.set('sentiment', state.sentiment);
  if (state.impact)    p.set('market_impact_level', state.impact);
  if (state.category)  p.set('event_category',  state.category);
  if (state.search)    p.set('search',    state.search);
  try {
    const r = await fetch(`${NEWS_URL}?${p}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    let arts = d.articles || [];

    // Safety-net client-side filtering, in case the backend query params
    // don't (yet) match these renamed fields.
    if (state.category) arts = arts.filter(a => a.event_category === state.category);
    if (state.impact)   arts = arts.filter(a => a.market_impact_level === state.impact);

    state.total    = state.category || state.impact ? arts.length : d.total;
    state.articles = reset ? arts : [...state.articles, ...arts];
    renderArticles(reset);
    const showing = state.articles.length;
    document.getElementById('feedCount').textContent =
      `Showing ${showing} of ${state.total} articles`;
    document.getElementById('feedCountBadge').textContent =
      `${showing} / ${state.total}`;
    document.getElementById('newsTabCount').textContent = d.total ?? showing;
    const lb = document.getElementById('loadMoreBtn');
    lb.style.display = showing < state.total ? 'block' : 'none';
    lb.textContent = `Load ${Math.min(state.pageSize, state.total - showing)} more · ${state.total - showing} remaining`;
  } catch (err) {
    document.getElementById('articlesFeed').innerHTML =
      `<div class="empty"><span class="icon">⚠</span>Could not reach the API.<br>Check connection.</div>`;
  } finally { state.loading = false; }
}

function renderArticles(reset) {
  const feed = document.getElementById('articlesFeed');
  if (reset) {
    if (!state.articles.length) {
      feed.innerHTML = `<div class="empty"><span class="icon">◎</span>No articles match your filters.</div>`;
      return;
    }
    feed.innerHTML = '';
  }
  const batch = reset ? state.articles : state.articles.slice(-state.pageSize);
  batch.forEach(a => feed.appendChild(buildCard(a)));
}

function esc(s) {
  if (s === null || s === undefined) return '';
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleString(undefined, { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
}

function fmtDateShort(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleDateString(undefined, { day: '2-digit', month: 'short', year: 'numeric' });
}

function buildCard(a) {
  const div = document.createElement('div');
  div.className = 'card';
  div.dataset.id = a.id;

  const sent = (a.sentiment || 'Neutral').toLowerCase();
  const impact = (a.market_impact_level || '').toLowerCase();

  const stripeClass = {
    positive: 'stripe-positive', negative: 'stripe-negative',
    neutral: 'stripe-neutral', mixed: 'stripe-mixed',
  }[sent] || 'stripe-neutral';

  const chipSentClass = {
    positive: 'chip-positive', negative: 'chip-negative',
    neutral: 'chip-neutral', mixed: 'chip-mixed',
  }[sent] || 'chip-neutral';

  const chipImpactClass = {
    critical: 'chip-impact-critical', high: 'chip-impact-high',
    medium: 'chip-impact-medium', low: 'chip-impact-low',
  }[impact] || 'chip-impact-medium';

  const imgHtml = a.image_url
    ? `<img src="${esc(a.image_url)}" alt="${esc(a.image_alt || '')}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-img-placeholder>NO IMAGE</div>'" />`
    : `<div class="card-img-placeholder">NO IMAGE</div>`;

  const sectorsHtml = (a.affected_sectors || []).map(s => `<span class="sector-tag">${esc(s)}</span>`).join('');
  const companiesHtml = (a.affected_companies || []).map(s => `<span class="entity-tag">${esc(s)}</span>`).join('');
  const indicesHtml = (a.market_indices || []).map(s => `<span class="plain-tag">${esc(s)}</span>`).join('');
  const tagsHtml = (a.tags || []).map(s => `<span class="plain-tag">${esc(s)}</span>`).join('');

  div.innerHTML = `
    <div class="card-img-wrap">
      <div class="card-stripe ${stripeClass}"></div>
      ${imgHtml}
    </div>
    <div class="card-body">
      <div class="card-chips-row">
        ${a.event_category ? `<span class="chip chip-category">${esc(a.event_category)}</span>` : ''}
        <span class="chip ${chipSentClass}">${esc(a.sentiment || 'Neutral')}</span>
        ${a.market_impact_level ? `<span class="chip ${chipImpactClass}">${esc(a.market_impact_level)} impact</span>` : ''}
      </div>
      <div class="card-headline">${esc(a.headline)}</div>
      <div class="card-summary">${esc(a.executive_summary || '')}</div>
      <div class="card-footer">
        <div class="card-meta">
          <span>${fmtDate(a.published_at)}</span>
        </div>
        <span class="expand-btn" id="hint-${a.id}">Read full story ↓</span>
      </div>
    </div>
    <div class="card-story">
      <div class="story-section">
        <div class="story-label">Full story</div>
        <div class="story-text">${esc(a.story) || 'No full story available.'}</div>
      </div>

      <div class="story-grid">
        ${a.market_impact ? `<div class="story-section"><div class="story-label">Market impact</div><div class="story-text">${esc(a.market_impact)}</div></div>` : ''}
        ${a.trading_implications ? `<div class="story-section"><div class="story-label">Trading implications</div><div class="story-text">${esc(a.trading_implications)}</div></div>` : ''}
        ${a.retail_investor_impact ? `<div class="story-section"><div class="story-label">Retail investor impact</div><div class="story-text">${esc(a.retail_investor_impact)}</div></div>` : ''}
        ${a.institutional_impact ? `<div class="story-section"><div class="story-label">Institutional impact</div><div class="story-text">${esc(a.institutional_impact)}</div></div>` : ''}
        ${a.risk_factors ? `<div class="story-section"><div class="story-label">Risk factors</div><div class="story-text">${esc(a.risk_factors)}</div></div>` : ''}
        ${a.future_outlook ? `<div class="story-section"><div class="story-label">Future outlook</div><div class="story-text">${esc(a.future_outlook)}</div></div>` : ''}
      </div>

      <div class="story-tags-wrap">
        ${sectorsHtml ? `<div><div class="story-label">Affected sectors</div><div class="tag-list">${sectorsHtml}</div></div>` : ''}
        ${companiesHtml ? `<div><div class="story-label">Affected companies</div><div class="tag-list">${companiesHtml}</div></div>` : ''}
        ${indicesHtml ? `<div><div class="story-label">Market indices</div><div class="tag-list">${indicesHtml}</div></div>` : ''}
        ${tagsHtml ? `<div><div class="story-label">Tags</div><div class="tag-list">${tagsHtml}</div></div>` : ''}
      </div>

      <div class="story-source-line">
        <span>PRIMARY ENTITY <b style="color:var(--forest)">${esc(a.primary_entity || '—')}</b> (${esc(a.entity_type || '—')}) · TIME HORIZON ${esc(a.time_horizon || '—')}</span>
      </div>
    </div>`;

  div.addEventListener('click', () => {
    div.classList.toggle('expanded');
    const h = document.getElementById(`hint-${a.id}`);
    if (h) h.textContent = div.classList.contains('expanded') ? 'Collapse ↑' : 'Read full story ↓';
  });

  return div;
}

function setFilter(type, val, btn) {
  state[type] = val;
  const g = btn.closest('.filter-group') || btn.parentElement;
  g.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  fetchArticles(true);
}

function setSort(val, btn) {
  state.sort = val;
  document.querySelectorAll('#newsView .sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  fetchArticles(true);
}

function loadMore() { state.page++; fetchArticles(false); }

async function triggerRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true; btn.textContent = '↻ Refreshing…';
  try { await fetch(REFRESH_URL, { method: 'POST' }); } catch {}
  setTimeout(() => { fetchArticles(true); fetchStatus(); }, 2000);
  setTimeout(() => { btn.disabled = false; btn.textContent = '↻ Refresh'; }, 4000);
}

/* ══════════════════ Financial Results logic ══════════════════ */

function fmtCr(n) {
  if (n === null || n === undefined) return '—';
  return `₹${Number(n).toLocaleString('en-IN', { maximumFractionDigits: 2 })} Cr`;
}

function fmtPct(n) {
  if (n === null || n === undefined) return null;
  const v = Number(n);
  return { text: `${v >= 0 ? '▲' : '▼'} ${Math.abs(v).toFixed(1)}%`, up: v >= 0 };
}

async function fetchFiResults(reset = false) {
  if (fiState.loading) return;
  fiState.loading = true;
  if (reset) { fiState.page = 1; fiState.results = []; }
  const p = new URLSearchParams({ page: fiState.page, page_size: fiState.pageSize, sort: fiState.sort });
  if (fiState.sentiment)      p.set('sentiment', fiState.sentiment);
  if (fiState.impact)         p.set('impact', fiState.impact);
  if (fiState.recommendation) p.set('recommendation', fiState.recommendation);
  if (fiState.exchange)       p.set('exchange', fiState.exchange);
  if (fiState.search)         p.set('search', fiState.search);
  try {
    const r = await fetch(`${RESULTS_URL}?${p}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    const items = d.results || [];
    fiState.total   = d.total ?? items.length;
    fiState.results = reset ? items : [...fiState.results, ...items];
    fiState.loaded  = true;
    renderFiResults(reset);
    const showing = fiState.results.length;
    document.getElementById('fiFeedCount').textContent =
      `Showing ${showing} of ${fiState.total} results`;
    document.getElementById('fiFeedCountBadge').textContent =
      `${showing} / ${fiState.total}`;
    document.getElementById('resultsTabCount').textContent = fiState.total;
    const lb = document.getElementById('fiLoadMoreBtn');
    lb.style.display = showing < fiState.total ? 'block' : 'none';
    lb.textContent = `Load ${Math.min(fiState.pageSize, fiState.total - showing)} more · ${fiState.total - showing} remaining`;
  } catch (err) {
    document.getElementById('resultsFeed').innerHTML =
      `<div class="empty"><span class="icon">⚠</span>Could not reach the API.<br>Check connection.</div>`;
  } finally { fiState.loading = false; }
}

function renderFiResults(reset) {
  const feed = document.getElementById('resultsFeed');
  if (reset) {
    if (!fiState.results.length) {
      feed.innerHTML = `<div class="empty"><span class="icon">◎</span>No results match your filters.</div>`;
      return;
    }
    feed.innerHTML = '';
  }
  const batch = reset ? fiState.results : fiState.results.slice(-fiState.pageSize);
  batch.forEach(r => feed.appendChild(buildFiCard(r)));
}

function buildFiCard(r) {
  const div = document.createElement('div');
  div.className = 'fi-card';
  div.dataset.id = r.id;

  const sent = (r.sentiment || 'NEUTRAL').toLowerCase();
  const impact = (r.impact || '').toLowerCase();
  const rec = (r.recommendation || 'HOLD').toLowerCase();

  const railClass = { bullish: 'rail-bullish', bearish: 'rail-bearish', neutral: 'rail-neutral', mixed: 'rail-mixed' }[sent] || 'rail-neutral';
  const chipSentClass = { bullish: 'chip-positive', bearish: 'chip-negative', neutral: 'chip-neutral', mixed: 'chip-mixed' }[sent] || 'chip-neutral';
  const chipImpactClass = { critical: 'chip-impact-critical', high: 'chip-impact-high', medium: 'chip-impact-medium', low: 'chip-impact-low' }[impact] || 'chip-impact-medium';
  const stampClass = { buy: 'stamp-buy', sell: 'stamp-sell', hold: 'stamp-hold' }[rec] || 'stamp-hold';

  const revDelta = fmtPct(r.revenue_change_yoy);
  const profitDelta = fmtPct(r.profit_change_yoy);
  const epsDelta = fmtPct(r.eps_change_yoy);

  const metricsHtml = `
    <div class="fi-metrics-row">
      <div class="fi-metric">
        <span class="fi-metric-label">Revenue</span>
        <span class="fi-metric-value">${fmtCr(r.revenue)}</span>
        ${revDelta ? `<span class="fi-metric-delta ${revDelta.up ? 'delta-up' : 'delta-down'}">${revDelta.text} YoY</span>` : ''}
      </div>
      <div class="fi-metric">
        <span class="fi-metric-label">Net profit</span>
        <span class="fi-metric-value">${fmtCr(r.profit_net)}</span>
        ${profitDelta ? `<span class="fi-metric-delta ${profitDelta.up ? 'delta-up' : 'delta-down'}">${profitDelta.text} YoY</span>` : ''}
      </div>
      ${r.basic_eps !== null && r.basic_eps !== undefined ? `
      <div class="fi-metric">
        <span class="fi-metric-label">EPS</span>
        <span class="fi-metric-value">₹${Number(r.basic_eps).toFixed(2)}</span>
        ${epsDelta ? `<span class="fi-metric-delta ${epsDelta.up ? 'delta-up' : 'delta-down'}">${epsDelta.text} YoY</span>` : ''}
      </div>` : ''}
      ${r.profit_before_tax !== null && r.profit_before_tax !== undefined ? `
      <div class="fi-metric">
        <span class="fi-metric-label">Profit before tax</span>
        <span class="fi-metric-value">${fmtCr(r.profit_before_tax)}</span>
      </div>` : ''}
      ${r.ebitda !== null && r.ebitda !== undefined ? `
      <div class="fi-metric">
        <span class="fi-metric-label">EBITDA</span>
        <span class="fi-metric-value">${fmtCr(r.ebitda)}</span>
      </div>` : ''}
      ${r.operating_profit !== null && r.operating_profit !== undefined ? `
      <div class="fi-metric">
        <span class="fi-metric-label">Operating profit</span>
        <span class="fi-metric-value">${fmtCr(r.operating_profit)}</span>
      </div>` : ''}
      ${r.depreciation !== null && r.depreciation !== undefined ? `
      <div class="fi-metric">
        <span class="fi-metric-label">Depreciation</span>
        <span class="fi-metric-value">${fmtCr(r.depreciation)}</span>
      </div>` : ''}
    </div>`;

  const forecastCard = (label, f) => {
    if (!f) return '';
    const dirClass = { UP: 'dir-up', DOWN: 'dir-down' }[f.direction] || 'dir-flat';
    const arrow = { UP: '▲', DOWN: '▼' }[f.direction] || '→';
    return `
      <div class="forecast-card">
        <div class="forecast-head">
          <span class="story-label" style="margin-bottom:0;">${esc(label)}</span>
          <span class="forecast-conf">${esc(f.confidence || '—')} confidence</span>
        </div>
        <div class="forecast-dir ${dirClass}">${arrow} ${esc(f.direction || '—')}</div>
        <div class="forecast-reason" style="margin-top:6px;">${esc(f.reason || '')}</div>
      </div>`;
  };

  const marginBits = [];
  if (r.pat_margin !== null && r.pat_margin !== undefined) marginBits.push(`PAT margin <b>${Number(r.pat_margin).toFixed(1)}%</b>`);
  if (r.ebitda_margin !== null && r.ebitda_margin !== undefined) marginBits.push(`EBITDA margin <b>${Number(r.ebitda_margin).toFixed(1)}%</b>`);
  if (r.operating_profit_margin !== null && r.operating_profit_margin !== undefined && !r.ebitda_margin) marginBits.push(`Operating margin <b>${Number(r.operating_profit_margin).toFixed(1)}%</b>`);

  div.innerHTML = `
    <div class="fi-rail ${railClass}">
      <div class="fi-symbol">${esc(r.symbol || '—')}</div>
      <div class="fi-exchange">${esc(r.exchange || '')}</div>
      <div class="fi-company">${esc(r.company_name || '')}</div>
      <div class="fi-rail-divider"></div>
      <div class="fi-quarter">${esc(r.quarter || '')}</div>
      <div class="fi-result-date">${fmtDateShort(r.result_date)}</div>
    </div>
    <div class="fi-body">
      <span class="stamp ${stampClass}">${esc(r.recommendation || 'HOLD')}</span>
      <div class="fi-chips-row">
        <span class="chip ${chipSentClass}">${esc(r.sentiment || 'NEUTRAL')}</span>
        ${r.impact ? `<span class="chip ${chipImpactClass}">${esc(r.impact)} impact</span>` : ''}
        ${r.standalone_consolidated ? `<span class="chip chip-category">${esc(r.standalone_consolidated)}</span>` : ''}
      </div>
      <div class="fi-headline">${esc(r.headline)}</div>
      <div class="fi-summary">${esc(r.executive_summary || '')}</div>
      <div class="fi-footer">
        <div class="fi-meta"><span>${esc(r.financial_year || '')}</span></div>
        <span class="expand-btn" id="fi-hint-${r.id}">Read full report ↓</span>
      </div>
    </div>
    <div class="fi-story">
      <div class="story-section">
        <div class="story-label">Key figures</div>
        ${metricsHtml}
      </div>
      ${r.guidance ? `
      <div class="story-section">
        <div class="story-label">Management guidance</div>
        <div class="story-text">${esc(r.guidance)}</div>
      </div>` : ''}
      ${(r.forecast_short_term || r.forecast_medium_term) ? `
      <div class="story-section">
        <div class="story-label">Outlook</div>
        <div class="forecast-grid">
          ${forecastCard('Short term', r.forecast_short_term)}
          ${forecastCard('Medium term', r.forecast_medium_term)}
        </div>
      </div>` : ''}
      <div class="fi-detail-strip">
        ${marginBits.length ? marginBits.map(b => `<span>${b}</span>`).join('') : ''}
        ${r.filing_type ? `<span>Filing <b>${esc(r.filing_type)}</b></span>` : ''}
        ${r.period_start && r.period_end ? `<span>Period <b>${esc(r.period_start)} → ${esc(r.period_end)}</b></span>` : ''}
      </div>
    </div>`;

  div.addEventListener('click', () => {
    div.classList.toggle('expanded');
    const h = document.getElementById(`fi-hint-${r.id}`);
    if (h) h.textContent = div.classList.contains('expanded') ? 'Collapse ↑' : 'Read full report ↓';
  });

  return div;
}

function setFiFilter(type, val, btn) {
  fiState[type] = val;
  const g = btn.closest('.filter-group') || btn.parentElement;
  g.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  fetchFiResults(true);
}

function setFiSort(val, btn) {
  fiState.sort = val;
  document.querySelectorAll('#resultsView .sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  fetchFiResults(true);
}

function loadMoreFi() { fiState.page++; fetchFiResults(false); }
</script>
</body>
</html>
